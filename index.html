<!DOCTYPE html>

<html>

<head>

<title>Fundraising CRM Cloud Dashboard LIVE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
}

h1 {
    color: #222;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    font-size: 13px;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
    vertical-align: top;
}

th {
    background: #1f4e79;
    color: white;
}

.hot {
    background: #ffd6d6;
}

.warm {
    background: #fff4cc;
}

.cold {
    background: #ddeeff;
}

button {
    padding: 5px 8px;
    cursor: pointer;
    margin: 2px;
    font-size: 12px;
}

input, textarea, select {
    font-family: Arial, sans-serif;
    font-size: 12px;
}

.small-input {
    width: 80px;
}

.medium-input {
    width: 120px;
}

.email-input {
    width: 165px;
}

.location-cell {
    width: 85px;
    max-width: 85px;
    font-size: 12px;
}

.status-select {
    width: 105px;
    font-size: 12px;
}

.amount-input {
    width: 65px;
}

.notes-box {
    width: 340px;
    min-height: 120px;
}

#reportBox {
    margin: 15px 0;
    padding: 20px;
    background: white;
    border: 1px solid #ccc;
    display: none;
}

.report-line {
    margin-bottom: 8px;
}

.report-list li {
    margin-bottom: 8px;
}

@media print {
    body {
        background: white;
        padding: 0;
    }

    h1,
    #topButtons,
    #addDonorBox,
    #crmTable {
        display: none !important;
    }

    #reportBox {
        display: block !important;
        border: none;
        padding: 0;
        margin: 0;
    }

    .no-print {
        display: none !important;
    }
}

</style>

</head>

<body>

<h1>Fundraising CRM Dashboard live</h1>

<div id="topButtons" style="margin-bottom: 15px;">
    <button onclick="setFilter('callQueue')">Call Queue</button>
    <button onclick="setFilter('callbacks')">Callbacks</button>
    <button onclick="setFilter('email')">Email Follow Up</button>
    <button onclick="setFilter('noAnswer')">No Answer</button>
    <button onclick="setFilter('closedSales')">Closed Sales</button>
    <button onclick="setFilter('all')">All Contacts</button>
    <button onclick="showReport()">Report</button>
</div>

<div id="reportBox"></div>

<div id="addDonorBox" style="margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; background: white;">
    <h2>Add Donor</h2>

    <input id="card_id" placeholder="Card / PCL ID"><br><br>

    <input id="business_name" placeholder="Business Name"><br><br>

    <input id="contact_name" placeholder="Contact Name"><br><br>

    <input id="phone" placeholder="Mobile"><br><br>

    <input id="office_phone" placeholder="Main Number"><br><br>

    <input id="email" placeholder="Email"><br><br>

    <input id="location" placeholder="Location"><br><br>

    <input id="status" placeholder="Status"><br><br>

    <textarea id="notes" placeholder="Notes"></textarea><br><br>

    <button onclick="addDonor()">Add Donor</button>
</div>

<table id="crmTable">

<thead>
<tr>
<th>ID</th>
<th>Business</th>
<th>Contact</th>
<th>Mobile</th>
<th>Main Number</th>
<th>Email</th>
<th>Location</th>
<th>Status</th>
<th>Amount</th>
<th>Sales History</th>
<th>Notes</th>
<th>Callback Date</th>
</tr>
</thead>

<tbody id="donorTable"></tbody>

</table>

<script>

const SUPABASE_URL = "https://ldkxgkigfbviyxlspxrl.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxka3hna2lnZmJ2aXl4bHNweHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MDQzNTgsImV4cCI6MjA5NTA4MDM1OH0.QuFqGtAdT85dVyF7Xs1pobhGb2I7o9D9ORTGk0T070s";

const client = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

let currentFilter = 'callQueue';

function setFilter(filterName) {
    currentFilter = filterName;

    document.getElementById('reportBox').style.display = 'none';
    document.getElementById('addDonorBox').style.display = 'block';
    document.getElementById('crmTable').style.display = 'table';

    loadDonors();
}

function backToCallQueue() {
    setFilter('callQueue');
}

async function loadDonors() {

    const { data, error } = await client
        .from('donors')
        .select('*')
        .order('suggested_ask', { ascending: false });

    if (error) {
        console.log(error);
        alert('Could not load donors');
        return;
    }

    let filteredData = data;

    if (currentFilter === 'callQueue') {
        filteredData = data.filter(donor =>
            !donor.status || donor.status === 'Not Called'
        );
    }

    if (currentFilter === 'callbacks') {
        filteredData = data.filter(donor =>
            donor.status === 'Callback Requested'
        );
    }

    if (currentFilter === 'email') {
        filteredData = data.filter(donor =>
            donor.status === 'Email Sent'
        );
    }

    if (currentFilter === 'noAnswer') {
        filteredData = data.filter(donor =>
            donor.status === 'No Answer'
        );
    }

    if (currentFilter === 'closedSales') {
        filteredData = data.filter(donor =>
            donor.status === 'Closed Sale'
        );
    }

    if (currentFilter === 'all') {
        filteredData = data;
    }

    const donorTable = document.getElementById('donorTable');

    donorTable.innerHTML = '';

    filteredData.forEach(donor => {

        let statusClass = '';

        if (donor.status) {
            statusClass = donor.status.toLowerCase();
        }

        donorTable.innerHTML += `
            <tr class="${statusClass}">
                <td>${donor.card_id || ''}</td>

                <td>${donor.business_name || ''}</td>

                <td>${donor.contact_name || ''}</td>

                <td>
                    <input
                    value="${donor.mobile || ''}"
                    onchange="updateMobile(${donor.id}, this.value)"
                    class="medium-input"
                    >
                    <br>
                    <button onclick="window.location.href='tel:${donor.mobile || ''}'">Call Mobile</button>
                </td>

                <td>
                    <input
                    value="${donor.office_phone || ''}"
                    onchange="updateOfficePhone(${donor.id}, this.value)"
                    class="medium-input"
                    >
                    <br>
                    <button onclick="window.location.href='tel:${donor.office_phone || ''}'">Call Main</button>
                </td>

                <td>
                    <input
                    value="${donor.email || ''}"
                    onchange="updateEmail(${donor.id}, this.value)"
                    class="email-input"
                    >
                </td>

                <td class="location-cell">${donor.location || ''}</td>

                <td>
                    <select onchange="updateStatus(${donor.id}, this.value)" class="status-select">
                        <option ${donor.status === 'Not Called' ? 'selected' : ''}>Not Called</option>
                        <option ${donor.status === 'No Answer' ? 'selected' : ''}>No Answer</option>
                        <option ${donor.status === 'Callback Requested' ? 'selected' : ''}>Callback Requested</option>
                        <option ${donor.status === 'Follow Up' ? 'selected' : ''}>Follow Up</option>
                        <option ${donor.status === 'Email Sent' ? 'selected' : ''}>Email Sent</option>
                        <option ${donor.status === 'Interested' ? 'selected' : ''}>Interested</option>
                        <option ${donor.status === 'Closed Sale' ? 'selected' : ''}>Closed Sale</option>
                        <option ${donor.status === 'Not Interested' ? 'selected' : ''}>Not Interested</option>
                    </select>
                </td>

                <td>
                    <input
                    type="number"
                    value="${donor.suggested_ask || ''}"
                    onchange="updateSuggestedAsk(${donor.id}, this.value)"
                    class="amount-input"
                    >
                </td>

                <td>${donor.sales_history || ''}</td>

                <td>
                    <textarea
                    onchange="updateNotes(${donor.id}, this.value)"
                    rows="7"
                    class="notes-box"
                    >${donor.notes || ''}</textarea>
                </td>

                <td>
                    <input
                    type="date"
                    value="${donor.callback_date || ''}"
                    onchange="updateCallbackDate(${donor.id}, this.value)"
                    style="width: 120px;"
                    >
                </td>
            </tr>
        `;
    });
}

loadDonors();

async function updateStatus(id, status) {
    const { error } = await client
        .from('donors')
        .update({ status: status })
        .eq('id', id);

    if (error) {
        console.error('Status update failed:', error);
        alert('Failed to save status');
    } else {
        console.log('Status updated');
        loadDonors();
    }
}

async function updateMobile(id, mobile) {
    const { error } = await client
        .from('donors')
        .update({ mobile: mobile })
        .eq('id', id);

    if (error) {
        console.error('Mobile update failed:', error);
        alert('Failed to save mobile');
    } else {
        console.log('Mobile updated');
    }
}

async function updateOfficePhone(id, office_phone) {
    const { error } = await client
        .from('donors')
        .update({ office_phone: office_phone })
        .eq('id', id);

    if (error) {
        console.error('Main number update failed:', error);
        alert('Failed to save main number');
    } else {
        console.log('Main number updated');
    }
}

async function updateNotes(id, notes) {
    const { error } = await client
        .from('donors')
        .update({ notes: notes })
        .eq('id', id);

    if (error) {
        console.error('Notes update failed:', error);
        alert('Failed to save notes');
    } else {
        console.log('Notes updated');
    }
}

async function updateCallbackDate(id, callback_date) {
    const { error } = await client
        .from('donors')
        .update({ callback_date: callback_date })
        .eq('id', id);

    if (error) {
        console.error('Callback date update failed:', error);
        alert('Failed to save callback date');
    } else {
        console.log('Callback date updated');
    }
}

async function updateSuggestedAsk(id, suggested_ask) {
    const { error } = await client
        .from('donors')
        .update({ suggested_ask: suggested_ask })
        .eq('id', id);

    if (error) {
        console.error('Amount update failed:', error);
        alert('Failed to save amount');
    } else {
        console.log('Amount updated');
    }
}

async function updateEmail(id, email) {
    const { error } = await client
        .from('donors')
        .update({ email: email })
        .eq('id', id);

    if (error) {
        console.error('Email update failed:', error);
        alert('Failed to save email');
    } else {
        console.log('Email updated');
    }
}

async function showReport() {

    const { data, error } = await client
        .from('donors')
        .select('*');

    if (error) {
        console.error('Report failed:', error);
        alert('Could not load report');
        return;
    }

    const campaignCode = '1A2601';

    const totalContacts = data.length;

    const callQueue = data.filter(donor =>
        !donor.status || donor.status === 'Not Called'
    ).length;

    const noAnswer = data.filter(donor =>
        donor.status === 'No Answer'
    ).length;

    const callbacks = data.filter(donor =>
        donor.status === 'Callback Requested'
    ).length;

    const emailsSentList = data.filter(donor =>
        donor.status === 'Email Sent'
    );

    const closedSales = data.filter(donor =>
        donor.status === 'Closed Sale'
    );

    const emailsSent = emailsSentList.length;
    const closedSalesCount = closedSales.length;

    const closedSalesTotal = closedSales.reduce((sum, donor) => {
        return sum + Number(donor.suggested_ask || 0);
    }, 0);

    const callsMade = totalContacts - callQueue;
    const callsAnswered = callsMade - noAnswer;

    let closedSalesHtml = '';

    closedSales.forEach((donor, index) => {
        closedSalesHtml += '<li>' +
            'ID: ' + (donor.card_id || '') +
            ' — Amount: $' + (donor.suggested_ask || 0) +
            ' — Campaign: ' + campaignCode +
            ' — Sale #: ' + (index + 1) +
            ' — Contact: ' + (donor.contact_name || '') +
            ' — Email: ' + (donor.email || '') +
            '</li>';
    });

    let emailsSentHtml = '';

    emailsSentList.forEach(donor => {
        emailsSentHtml += '<li>' +
            'ID: ' + (donor.card_id || '') +
            ' — Business: ' + (donor.business_name || '') +
            ' — Contact: ' + (donor.contact_name || '') +
            ' — Amount: $' + (donor.suggested_ask || 0) +
            ' — Follow-up Date: ' + (donor.callback_date || '') +
            '</li>';
    });

    const reportBox = document.getElementById('reportBox');

    document.getElementById('addDonorBox').style.display = 'none';
    document.getElementById('crmTable').style.display = 'none';

    reportBox.style.display = 'block';

    reportBox.innerHTML =
        '<h2>Fundraising Report</h2>' +
        '<p class="report-line"><strong>Total contacts:</strong> ' + totalContacts + '</p>' +
        '<p class="report-line"><strong>Calls made / worked:</strong> ' + callsMade + '</p>' +
        '<p class="report-line"><strong>Calls answered:</strong> ' + callsAnswered + '</p>' +
        '<p class="report-line"><strong>No answers:</strong> ' + noAnswer + '</p>' +
        '<p class="report-line"><strong>Callbacks:</strong> ' + callbacks + '</p>' +
        '<p class="report-line"><strong>Emails sent:</strong> ' + emailsSent + '</p>' +
        '<p class="report-line"><strong>Closed sales:</strong> ' + closedSalesCount + '</p>' +
        '<p class="report-line"><strong>Total sales amount:</strong> $' + closedSalesTotal + '</p>' +
        '<h3>Closed Sales</h3>' +
        '<ul class="report-list">' + closedSalesHtml + '</ul>' +
        '<h3>Email Sent Follow Ups</h3>' +
        '<ul class="report-list">' + emailsSentHtml + '</ul>' +
        '<div class="no-print" style="margin-top: 20px;">' +
            '<button onclick="backToCallQueue()">Back to Call Queue</button>' +
            '<button onclick="window.print()">Print / Save as PDF</button>' +
        '</div>';
}

async function addDonor() {

    const card_id = document.getElementById('card_id').value;
    const business_name = document.getElementById('business_name').value;
    const contact_name = document.getElementById('contact_name').value;
    const phone = document.getElementById('phone').value;
    const office_phone = document.getElementById('office_phone').value;
    const email = document.getElementById('email').value;
    const location = document.getElementById('location').value;
    const status = document.getElementById('status').value;
    const notes = document.getElementById('notes').value;

    const { error } = await client
        .from('donors')
        .insert([
            {
                card_id,
                business_name,
                contact_name,
                mobile: phone,
                office_phone,
                email,
                location,
                status,
                notes
            }
        ]);

    if (error) {
        console.error('Add donor failed:', error);
        alert('Failed to add donor');
    } else {
        alert('Donor added');

        loadDonors();

        document.getElementById('card_id').value = '';
        document.getElementById('business_name').value = '';
        document.getElementById('contact_name').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('office_phone').value = '';
        document.getElementById('email').value = '';
        document.getElementById('location').value = '';
        document.getElementById('status').value = '';
        document.getElementById('notes').value = '';
    }
}

</script>

</body>

</html>
