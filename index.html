<!DOCTYPE html>
<html>
<head>
<title>Fundraising CRM Cloud Dashboard LIVE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 14px;
}

h1 {
    color: #222;
    margin-bottom: 8px;
}

h2 {
    margin-top: 0;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    font-size: 11px;
}

th, td {
    border: 1px solid #ccc;
    padding: 4px;
    text-align: left;
    vertical-align: top;
}

th {
    background: #1f4e79;
    color: white;
}

button {
    padding: 5px 8px;
    cursor: pointer;
    margin: 2px;
    font-size: 12px;
}

input, textarea, select {
    font-family: Arial, sans-serif;
    font-size: 12px;
}

.top-bar {
    margin-bottom: 10px;
}

.help-text {
    font-size: 12px;
    color: #555;
    margin: 4px 0 10px 0;
}

.form-row {
    margin-bottom: 7px;
}

.form-row input,
.form-row textarea,
.form-row select {
    width: 95%;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
}

.form-box {
    padding: 12px;
    border: 1px solid #ccc;
    background: white;
}

.id-cell {
    width: 52px;
    max-width: 52px;
}

.campaign-cell {
    width: 75px;
    max-width: 75px;
    font-size: 10px;
}

.business-cell {
    width: 125px;
    max-width: 125px;
}

.contact-cell {
    width: 100px;
    max-width: 100px;
}

.phone-cell {
    width: 94px;
    max-width: 94px;
}

.email-cell {
    width: 120px;
    max-width: 120px;
    word-break: break-word;
}

.location-cell {
    width: 55px;
    max-width: 55px;
    font-size: 11px;
}

.status-select {
    width: 105px;
    font-size: 11px;
}

.amount-input {
    width: 52px;
}

.pcl-cell {
    width: 42px;
    text-align: center;
}

.sales-history-cell {
    width: 95px;
    max-width: 95px;
    font-size: 10px;
}

.notes-box {
    width: 240px;
    min-height: 86px;
}

.date-input {
    width: 100px;
}

.last-called-cell {
    width: 70px;
    max-width: 70px;
    font-size: 11px;
}

.badge {
    display: inline-block;
    padding: 2px 5px;
    border-radius: 8px;
    background: #e9eef5;
    margin: 1px 0;
    font-size: 10px;
}

.badge-red {
    background: #f8d7da;
}

.badge-green {
    background: #d4edda;
}

.badge-yellow {
    background: #fff3cd;
}

.danger-button {
    background: #b00020;
    color: white;
    border: 1px solid #8a0018;
}

.success-button {
    background: #1b7f3a;
    color: white;
    border: 1px solid #145c2b;
}

#reportBox {
    margin: 15px 0;
    padding: 20px;
    background: white;
    border: 1px solid #ccc;
    display: none;
}

#searchBox {
    width: 370px;
    padding: 6px;
}

.report-line {
    margin-bottom: 6px;
}

.report-list li {
    margin-bottom: 7px;
}

.report-table {
    margin: 10px 0 18px 0;
    font-size: 12px;
}

@media print {
    body {
        background: white;
        padding: 0;
    }

    h1,
    #topButtons,
    #searchArea,
    #campaignArea,
    #formArea,
    #crmTable {
        display: none !important;
    }

    #reportBox {
        display: block !important;
        border: none;
        padding: 0;
        margin: 0;
    }

    .no-print {
        display: none !important;
    }
}
</style>
</head>

<body>

<h1>Fundraising CRM Dashboard live</h1>

<div id="campaignArea" class="top-bar">
    <strong>Calling campaign:</strong>
    <select id="campaignFilter" onchange="setCampaignFilter(this.value)">
        <option value="all">All Campaigns</option>
    </select>
    <span class="help-text">Calling lists are campaign-filtered. Global search ignores this and searches everything.</span>
</div>

<div id="topButtons" class="top-bar">
    <button onclick="setFilter('callQueue')">Call Queue</button>
    <button onclick="setFilter('callbacks')">Callbacks</button>
    <button onclick="setFilter('email')">Email Follow Up</button>
    <button onclick="setFilter('noAnswer')">No Answer</button>
    <button onclick="setFilter('alreadyCalled')">Already Called</button>
    <button onclick="setFilter('checkDetails')">Check Details</button>
    <button onclick="setFilter('promotion')">Promotion</button>
    <button onclick="setFilter('coldCards')">Cold Cards</button>
    <button onclick="setFilter('closedSales')">Closed Sales To Enter</button>
    <button onclick="setFilter('all')">All Contacts</button>
    <button onclick="showDailyReport()">Daily Report</button>
    <button onclick="showPayCycleReport()">Pay Cycle Report</button>
    <button onclick="showCampaignReport()">Campaign Report</button>
</div>

<div id="searchArea" class="top-bar">
    <input id="searchBox" placeholder="Global search: ID, phone, business, contact, email, notes, campaign, charity, status..." oninput="searchContacts()">
    <button onclick="clearSearch()">Clear Search</button>
</div>

<div id="reportBox"></div>

<div id="formArea" class="form-grid">

    <div class="form-box">
        <h2>Add New Contact</h2>

        <div class="form-row"><input id="card_id" placeholder="Card / PCL ID"></div>
        <div class="form-row"><input id="business_name" placeholder="Business Name"></div>
        <div class="form-row"><input id="contact_name" placeholder="Contact Name"></div>
        <div class="form-row"><input id="phone" placeholder="Mobile"></div>
        <div class="form-row"><input id="office_phone" placeholder="Main Number"></div>
        <div class="form-row"><input id="email" placeholder="Email"></div>
        <div class="form-row"><input id="location" placeholder="Location"></div>
        <div class="form-row"><input id="charity_name" placeholder="Charity e.g. Autism NZ" value="Autism NZ"></div>
        <div class="form-row"><input id="campaign_code" placeholder="Campaign Code" value="1A2601"></div>
        <div class="form-row"><input id="campaign_area" placeholder="Campaign Area / Region"></div>
        <div class="form-row"><input id="campaign_year" placeholder="Campaign Year" type="number" value="2026"></div>
        <div class="form-row">
            <select id="status">
                <option value="Not Called">Not Called</option>
                <option value="Check Details">Check Details</option>
            </select>
        </div>
        <div class="form-row"><textarea id="notes" placeholder="Notes"></textarea></div>

        <button onclick="addDonor()">Add Donor</button>
    </div>

    <div class="form-box">
        <h2>Edit Contact</h2>

        <div class="form-row">
            <input id="edit_lookup" placeholder="Enter ID, phone, or business name to load">
            <button onclick="loadContactForEdit()">Load Contact</button>
        </div>

        <input type="hidden" id="edit_id">

        <div class="form-row"><input id="edit_card_id" placeholder="Card / PCL ID"></div>
        <div class="form-row"><input id="edit_business_name" placeholder="Business Name"></div>
        <div class="form-row"><input id="edit_contact_name" placeholder="Main Contact Name"></div>
        <div class="form-row"><input id="edit_sale_contact_name" placeholder="Sale Contact / Authorised By / Replacement Name"></div>
        <div class="form-row"><input id="edit_mobile" placeholder="Mobile"></div>
        <div class="form-row"><input id="edit_office_phone" placeholder="Main Number"></div>
        <div class="form-row"><input id="edit_email" placeholder="Email"></div>
        <div class="form-row"><input id="edit_location" placeholder="Location"></div>
        <div class="form-row"><input id="edit_amount" placeholder="Amount" type="number"></div>
        <div class="form-row"><input id="edit_sale_number" placeholder="Sale Number" type="number"></div>

        <div class="form-row">
            <select id="edit_sale_type">
                <option value="">Sale Type</option>
                <option>Business Sale</option>
                <option>Personal Donation</option>
            </select>
        </div>

        <div class="form-row"><input id="edit_charity_name" placeholder="Charity"></div>
        <div class="form-row"><input id="edit_campaign_code" placeholder="Campaign Code"></div>
        <div class="form-row"><input id="edit_campaign_area" placeholder="Campaign Area / Region"></div>
        <div class="form-row"><input id="edit_campaign_year" placeholder="Campaign Year" type="number"></div>
        <div class="form-row"><input id="edit_campaign_status" placeholder="Campaign Status: Active / Paused / Closed"></div>
        <div class="form-row"><input id="edit_last_any_sale_year" placeholder="Last Any Sale Year" type="number"></div>
        <div class="form-row"><input id="edit_last_autism_sale_year" placeholder="Last Autism Sale Year" type="number"></div>
        <div class="form-row"><input id="edit_last_called_display" placeholder="Last Called" disabled></div>

        <div class="form-row">
            <label>
                <input type="checkbox" id="edit_cold_card">
                Cold Card
            </label>
        </div>

        <div class="form-row">
            <label>
                <input type="checkbox" id="edit_promotion_eligible">
                Promotion Eligible
            </label>
        </div>

        <div class="form-row">
            <label>
                <input type="checkbox" id="edit_pcl_entered">
                Sale Entered / PCL Entered
            </label>
        </div>

        <div class="form-row"><textarea id="edit_check_details_reason" placeholder="Check Details reason / what needs fixing"></textarea></div>
        <div class="form-row"><textarea id="edit_sales_history" placeholder="Sales History"></textarea></div>
        <div class="form-row"><textarea id="edit_notes" placeholder="Notes"></textarea></div>

        <button onclick="saveContactChanges()">Save Contact Changes</button>
        <button onclick="clearEditForm()">Clear Edit Form</button>
        <button class="danger-button" onclick="deleteLoadedContact()">Delete Contact</button>
    </div>

</div>

<table id="crmTable">
<thead>
<tr>
<th>ID</th>
<th>Campaign</th>
<th>Business</th>
<th>Contact</th>
<th>Mobile</th>
<th>Main</th>
<th>Email</th>
<th>Location</th>
<th>Last Called</th>
<th>Status</th>
<th>Amount</th>
<th>Entered</th>
<th>History</th>
<th>Notes</th>
<th>Callback</th>
<th>Edit</th>
</tr>
</thead>
<tbody id="donorTable"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ldkxgkigfbviyxlspxrl.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxka3hna2lnZmJ2aXl4bHNweHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MDQzNTgsImV4cCI6MjA5NTA4MDM1OH0.QuFqGtAdT85dVyF7Xs1pobhGb2I7o9D9ORTGk0T070s";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DEFAULT_CAMPAIGN_CODE = '1A2601';
const DEFAULT_CHARITY_NAME = 'Autism NZ';
const DEFAULT_CAMPAIGN_YEAR = 2026;
const PAY_CYCLE_START = '2026-06-08';

let currentFilter = 'callQueue';
let currentCampaignFilter = 'all';
let allDonors = [];

function todayString() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    return year + '-' + month + '-' + day;
}

function localDateString(value) {
    if (!value) return '';
    const date = new Date(value);
    if (isNaN(date.getTime())) return String(value).slice(0, 10);
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return year + '-' + month + '-' + day;
}

function escapeHtml(value) {
    return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
}

function normaliseStatus(status) {
    return String(status || '').trim().toLowerCase();
}

function isClosedSale(donor) {
    const status = normaliseStatus(donor.status);
    return status === 'closed sale' || status === 'personal donation' || status.includes('closed sale') || status.includes('sale');
}

function isNoStatus(donor) {
    const status = normaliseStatus(donor.status);
    return status === 'no' || status === 'not interested' || status.includes('not interested') || status.includes('declined') || status.includes('refused');
}

function isCallback(donor) {
    const status = normaliseStatus(donor.status);
    return status === 'callback requested' || status.includes('callback') || status.includes('call back');
}

function isEmailFollowUp(donor) {
    const status = normaliseStatus(donor.status);
    return status === 'email sent' || status.includes('email');
}

function isCheckDetails(donor) {
    const status = normaliseStatus(donor.status);
    return status === 'check details' || status === 'check number' || status.includes('check detail') || status.includes('check number');
}

function isActionableForColdPromoList(donor) {
    return !isClosedSale(donor) && !isNoStatus(donor) && !donor.pcl_entered;
}

function getCampaignCode(donor) {
    return String(donor.campaign_code || DEFAULT_CAMPAIGN_CODE).trim().toUpperCase();
}

function getCampaignLabel(donor) {
    const code = getCampaignCode(donor);
    const area = donor.campaign_area || '';
    const charity = donor.charity_name || DEFAULT_CHARITY_NAME;
    const year = donor.campaign_year || DEFAULT_CAMPAIGN_YEAR;
    return [code, charity, year, area].filter(Boolean).join(' | ');
}

function showDashboard() {
    document.getElementById('reportBox').style.display = 'none';
    document.getElementById('formArea').style.display = 'grid';
    document.getElementById('crmTable').style.display = 'table';
}

function showReportOnly() {
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('crmTable').style.display = 'none';
    document.getElementById('reportBox').style.display = 'block';
}

function setFilter(filterName) {
    currentFilter = filterName;
    showDashboard();
    renderDonors();
}

function setCampaignFilter(value) {
    currentCampaignFilter = value;
    showDashboard();
    renderDonors();
}

function backToCallQueue() {
    setFilter('callQueue');
}

function clearSearch() {
    document.getElementById('searchBox').value = '';
    currentFilter = 'callQueue';
    renderDonors();
}

function searchContacts() {
    currentFilter = 'search';
    showDashboard();
    renderDonors();
}

function donorMatchesSearch(donor, term) {
    const combined = [
        donor.card_id,
        donor.business_name,
        donor.contact_name,
        donor.sale_contact_name,
        donor.mobile,
        donor.office_phone,
        donor.email,
        donor.location,
        donor.status,
        donor.suggested_ask,
        donor.sales_history,
        donor.notes,
        donor.check_details_reason,
        donor.callback_date,
        donor.campaign_code,
        donor.campaign_area,
        donor.campaign_year,
        donor.campaign_status,
        donor.charity_name,
        donor.sale_type,
        donor.sale_number,
        donor.last_called,
        donor.last_status_change
    ].join(' ').toLowerCase();

    return combined.includes(term.toLowerCase());
}

function populateCampaignFilter() {
    const select = document.getElementById('campaignFilter');
    const previousValue = currentCampaignFilter;
    const campaignMap = new Map();

    allDonors.forEach(donor => {
        const code = getCampaignCode(donor);
        if (!campaignMap.has(code)) campaignMap.set(code, getCampaignLabel(donor));
    });

    select.innerHTML = '<option value="all">All Campaigns</option>';

    [...campaignMap.entries()]
        .sort((a, b) => a[0].localeCompare(b[0]))
        .forEach(([code, label]) => {
            const option = document.createElement('option');
            option.value = code;
            option.textContent = label;
            select.appendChild(option);
        });

    if ([...select.options].some(option => option.value === previousValue)) {
        select.value = previousValue;
    } else {
        select.value = 'all';
        currentCampaignFilter = 'all';
    }
}

async function loadDonors() {
    const { data, error } = await client
        .from('donors')
        .select('*');

    if (error) {
        console.log(error);
        alert('Could not load donors. If this happened after the update, run the SQL column setup first.');
        return;
    }

    allDonors = data || [];
    populateCampaignFilter();
    renderDonors();
}

function applyCampaignFilter(data) {
    if (currentCampaignFilter === 'all') return data;
    return data.filter(donor => getCampaignCode(donor) === currentCampaignFilter);
}

function getFilteredData() {
    let filteredData = [...allDonors];
    const searchTerm = document.getElementById('searchBox').value.trim();

    if (searchTerm) {
        return filteredData
            .filter(donor => donorMatchesSearch(donor, searchTerm))
            .sort((a, b) => String(a.business_name || '').localeCompare(String(b.business_name || '')));
    }

    filteredData = applyCampaignFilter(filteredData);

    if (currentFilter === 'callQueue') {
        filteredData = filteredData.filter(donor => {
            const status = normaliseStatus(donor.status);
            return !status || status === 'not called';
        });
    }

    if (currentFilter === 'callbacks') {
        filteredData = filteredData.filter(donor => isCallback(donor));
        filteredData.sort((a, b) => String(a.callback_date || '9999-12-31').localeCompare(String(b.callback_date || '9999-12-31')));
        return filteredData;
    }

    if (currentFilter === 'email') {
        filteredData = filteredData.filter(donor => isEmailFollowUp(donor));
    }

    if (currentFilter === 'noAnswer') {
        filteredData = filteredData.filter(donor => normaliseStatus(donor.status) === 'no answer');
    }

    if (currentFilter === 'alreadyCalled') {
        filteredData = filteredData.filter(donor => donor.last_called || donor.last_status_change);
        filteredData.sort((a, b) => String(b.last_called || b.last_status_change || '').localeCompare(String(a.last_called || a.last_status_change || '')));
        return filteredData;
    }

    if (currentFilter === 'checkDetails') {
        filteredData = filteredData.filter(donor => isCheckDetails(donor));
    }

    if (currentFilter === 'promotion') {
        filteredData = filteredData.filter(donor =>
            isActionableForColdPromoList(donor) &&
            (donor.promotion_eligible === true || calculatePromotionEligible(donor.last_autism_sale_year))
        );
    }

    if (currentFilter === 'coldCards') {
        filteredData = filteredData.filter(donor =>
            isActionableForColdPromoList(donor) &&
            (donor.cold_card === true || calculateColdCard(donor.last_any_sale_year, donor.sales_history))
        );
    }

    if (currentFilter === 'closedSales') {
        filteredData = filteredData.filter(donor => isClosedSale(donor) && donor.pcl_entered !== true);
        filteredData.sort((a, b) => {
            const saleA = Number(a.sale_number || 999999);
            const saleB = Number(b.sale_number || 999999);
            if (saleA !== saleB) return saleA - saleB;
            return String(a.sale_date || '').localeCompare(String(b.sale_date || ''));
        });
        return filteredData;
    }

    if (currentFilter === 'all') {
        filteredData = applyCampaignFilter([...allDonors]);
    }

    filteredData.sort((a, b) => Number(b.suggested_ask || 0) - Number(a.suggested_ask || 0));
    return filteredData;
}

function getLastCalledDisplay(value) {
    if (!value) return 'Not called';
    const date = new Date(value);
    if (isNaN(date.getTime())) return String(value).slice(0, 10);

    const today = todayString();
    const dateText = localDateString(value);

    if (dateText === today) {
        return date.toLocaleTimeString('en-NZ', { hour: 'numeric', minute: '2-digit' });
    }

    return date.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
}

function getReportContactName(donor) {
    return donor.sale_contact_name || donor.contact_name || '';
}

function getStatusOptions(selectedStatus) {
    const options = [
        'Not Called',
        'No Answer',
        'Callback Requested',
        'Follow Up',
        'Email Sent',
        'Interested',
        'Closed Sale',
        'Personal Donation',
        'Check Details',
        'Check Number',
        'Not Interested',
        'No'
    ];

    return options.map(option => {
        const selected = option === selectedStatus ? 'selected' : '';
        return `<option ${selected}>${escapeHtml(option)}</option>`;
    }).join('');
}

function renderDonors() {
    const donorTable = document.getElementById('donorTable');
    donorTable.innerHTML = '';

    const filteredData = getFilteredData();

    filteredData.forEach(donor => {
        const statusClass = donor.status ? donor.status.toLowerCase().replaceAll(' ', '-') : '';
        const campaignText = getCampaignCode(donor) + '<br>' + escapeHtml(donor.campaign_area || '');
        const contactDisplay = getReportContactName(donor);
        const saleContactBadge = donor.sale_contact_name ? '<br><span class="badge badge-green">sale contact</span>' : '';
        const coldBadge = (donor.cold_card === true || calculateColdCard(donor.last_any_sale_year, donor.sales_history)) ? '<br><span class="badge badge-yellow">cold</span>' : '';
        const promoBadge = (donor.promotion_eligible === true || calculatePromotionEligible(donor.last_autism_sale_year)) ? '<br><span class="badge">promo</span>' : '';
        const checkBadge = isCheckDetails(donor) ? '<br><span class="badge badge-red">check</span>' : '';
        const enteredText = donor.pcl_entered ? 'Yes' : 'No';
        const enteredButton = isClosedSale(donor) && !donor.pcl_entered ? '<br><button class="success-button" onclick="updatePclEntered(' + donor.id + ', true)">Mark Entered</button>' : '';

        donorTable.innerHTML += `
            <tr class="${statusClass}">
                <td class="id-cell">${escapeHtml(donor.card_id || '')}</td>

                <td class="campaign-cell">${campaignText}</td>

                <td class="business-cell">${escapeHtml(donor.business_name || '')}${coldBadge}${promoBadge}${checkBadge}</td>

                <td class="contact-cell">${escapeHtml(contactDisplay)}${saleContactBadge}</td>

                <td class="phone-cell">
                    ${escapeHtml(donor.mobile || '')}
                    <br>
                    <button onclick="callNumber('${escapeHtml(donor.mobile || '')}', ${donor.id})">Call Mobile</button>
                </td>

                <td class="phone-cell">
                    ${escapeHtml(donor.office_phone || '')}
                    <br>
                    <button onclick="callNumber('${escapeHtml(donor.office_phone || '')}', ${donor.id})">Call Main</button>
                </td>

                <td class="email-cell">
                    ${escapeHtml(donor.email || '')}
                </td>

                <td class="location-cell">${escapeHtml(donor.location || '')}</td>

                <td class="last-called-cell">${escapeHtml(getLastCalledDisplay(donor.last_called || donor.last_status_change))}</td>

                <td>
                    <select onchange="updateStatus(${donor.id}, this.value)" class="status-select">
                        ${getStatusOptions(donor.status || 'Not Called')}
                    </select>
                </td>

                <td>
                    <input
                    type="number"
                    value="${escapeHtml(donor.suggested_ask || '')}"
                    onchange="updateSuggestedAsk(${donor.id}, this.value)"
                    class="amount-input"
                    >
                </td>

                <td class="pcl-cell">
                    <input
                    type="checkbox"
                    ${donor.pcl_entered ? 'checked' : ''}
                    onchange="updatePclEntered(${donor.id}, this.checked)"
                    >
                    ${enteredText}${enteredButton}
                </td>

                <td class="sales-history-cell">${escapeHtml(donor.sales_history || '')}</td>

                <td>
                    <textarea
                    onchange="updateNotes(${donor.id}, this.value)"
                    rows="5"
                    class="notes-box"
                    >${escapeHtml(donor.notes || '')}</textarea>

}

        updateData.sale_type = status === 'Personal Donation' ? 'Personal Donation' : (donor.sale_type || 'Business Sale');

function calculateColdCard(lastAnySaleYear, salesHistory) {
    const explicitYear = Number(lastAnySaleYear || 0);
    if (explicitYear) return explicitYear <= 2020;

    const history = String(salesHistory || '').trim();
    if (!history) return true;

    const lowerHistory = history.toLowerCase();
    if (lowerHistory.includes('no sale history') || lowerHistory.includes('no sales history') || lowerHistory.includes('no history')) return true;

    const years = history.match(/\b(19|20)\d{2}\b/g);
    if (!years || years.length === 0) return true;

    const latestYear = Math.max(...years.map(Number));
    return latestYear <= 2020;
}

function calculatePromotionEligible(lastAutismSaleYear) {
    const year = Number(lastAutismSaleYear || 0);
    if (!year) return true;
    return year < 2023;
}

function dateInRange(dateValue, startDate, endDate) {
    if (!dateValue) return false;
    const dateText = String(dateValue).slice(0, 10);
    return dateText >= startDate && dateText <= endDate;
}

function donorWorkedInRange(donor, startDate, endDate) {
    return dateInRange(donor.last_status_change, startDate, endDate) ||
        dateInRange(donor.last_called, startDate, endDate) ||
        dateInRange(donor.sale_date, startDate, endDate) ||
        dateInRange(donor.email_sent_date, startDate, endDate) ||
        dateInRange(donor.check_details_date, startDate, endDate);
}

function getPayCycleRange() {
    const today = new Date(todayString() + 'T00:00:00');
    const base = new Date(PAY_CYCLE_START + 'T00:00:00');
    const dayMs = 24 * 60 * 60 * 1000;
    let diffDays = Math.floor((today - base) / dayMs);
    let cycles = Math.floor(diffDays / 14);

    if (diffDays < 0) cycles = 0;

    const start = new Date(base.getTime() + cycles * 14 * dayMs);
    const end = new Date(start.getTime() + 13 * dayMs);

    const toDateText = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return year + '-' + month + '-' + day;
    };

    return { start: toDateText(start), end: toDateText(end) };
}

function getReportDataByRange(data, startDate, endDate) {
    if (!startDate || !endDate) return [...data];
    return data.filter(donor => donorWorkedInRange(donor, startDate, endDate));
}

function getCampaignBreakdownHtml(worked, closedSales, emailsSentList) {
    const campaignCodes = [...new Set(worked.concat(closedSales).concat(emailsSentList).map(getCampaignCode))].sort();

    if (campaignCodes.length === 0) return '<p>No campaign activity in this period.</p>';

    let rows = '';
    campaignCodes.forEach(code => {
        const campaignWorked = worked.filter(donor => getCampaignCode(donor) === code);
        const campaignSales = closedSales.filter(donor => getCampaignCode(donor) === code);
        const campaignEmails = emailsSentList.filter(donor => getCampaignCode(donor) === code);
        const amount = campaignSales.reduce((sum, donor) => sum + Number(donor.suggested_ask || 0), 0);
        const sample = campaignWorked[0] || campaignSales[0] || campaignEmails[0] || {};

        rows += '<tr>' +
            '<td>' + escapeHtml(code) + '</td>' +
            '<td>' + escapeHtml(sample.charity_name || DEFAULT_CHARITY_NAME) + '</td>' +
            '<td>' + escapeHtml(sample.campaign_area || '') + '</td>' +
            '<td>' + campaignWorked.length + '</td>' +
            '<td>' + campaignEmails.length + '</td>' +
            '<td>' + campaignSales.length + '</td>' +
            '<td>$' + amount + '</td>' +
            '</tr>';
    });

    return '<table class="report-table"><thead><tr><th>Campaign</th><th>Charity</th><th>Area</th><th>Worked</th><th>Emails</th><th>Sales</th><th>Amount</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function buildReport(title, data, startDate, endDate, campaignOnly) {
    let reportData = [...data];

    if (campaignOnly && currentCampaignFilter !== 'all') {
        reportData = reportData.filter(donor => getCampaignCode(donor) === currentCampaignFilter);
    }

    const worked = getReportDataByRange(reportData, startDate, endDate);

    const callQueue = reportData.filter(donor => {
        const status = normaliseStatus(donor.status);
        return !status || status === 'not called';
    }).length;

    const noAnswer = worked.filter(donor => normaliseStatus(donor.status) === 'no answer').length;
    const callbacks = worked.filter(donor => isCallback(donor)).length;
    const checkDetails = worked.filter(donor => isCheckDetails(donor)).length;

    const emailsSentList = reportData.filter(donor => {
        if (startDate && endDate) return dateInRange(donor.email_sent_date, startDate, endDate) || (isEmailFollowUp(donor) && dateInRange(donor.last_status_change, startDate, endDate));
        return isEmailFollowUp(donor);
    });

    const closedSales = reportData.filter(donor => {
        if (!isClosedSale(donor)) return false;
        if (startDate && endDate) return dateInRange(donor.sale_date, startDate, endDate) || dateInRange(donor.last_status_change, startDate, endDate);
        return true;
    });

    closedSales.sort((a, b) => {
        const saleA = Number(a.sale_number || 999999);
        const saleB = Number(b.sale_number || 999999);
        if (saleA !== saleB) return saleA - saleB;
        return String(a.sale_date || '').localeCompare(String(b.sale_date || ''));
    });

    const coldCardSales = closedSales.filter(donor => donor.cold_card === true || calculateColdCard(donor.last_any_sale_year, donor.sales_history));
    const promotionSales = closedSales.filter(donor => donor.promotion_eligible === true || calculatePromotionEligible(donor.last_autism_sale_year));

    const closedSalesTotal = closedSales.reduce((sum, donor) => sum + Number(donor.suggested_ask || 0), 0);
    const callsMade = worked.length;
    const callsAnswered = Math.max(0, callsMade - noAnswer);

    let closedSalesHtml = '';
    closedSales.forEach((donor, index) => {
        const notesPreview = String(donor.notes || '').substring(0, 60);
        closedSalesHtml += '<li>' +
            'ID: ' + escapeHtml(donor.card_id || '') +
            ' — Business: ' + escapeHtml(donor.business_name || '') +
            ' — Contact: ' + escapeHtml(getReportContactName(donor)) +
            ' — Amount: $' + escapeHtml(donor.suggested_ask || 0) +
            ' — Sale #: ' + escapeHtml(donor.sale_number || (index + 1)) +
            ' — Type: ' + escapeHtml(donor.sale_type || '') +
            ' — Email: ' + escapeHtml(donor.email || '') +
            ' — Campaign: ' + escapeHtml(getCampaignCode(donor)) +
            ' — Entered: ' + (donor.pcl_entered ? 'Yes' : 'No') +
            ' — Notes: ' + escapeHtml(notesPreview) +
            '</li>';
    });

    let emailsSentHtml = '';
    emailsSentList.forEach(donor => {
        emailsSentHtml += '<li>' +
            'ID: ' + escapeHtml(donor.card_id || '') +
            ' — Business: ' + escapeHtml(donor.business_name || '') +
            ' — Contact: ' + escapeHtml(getReportContactName(donor)) +
            ' — Amount: $' + escapeHtml(donor.suggested_ask || 0) +
            ' — Follow-up Date: ' + escapeHtml(donor.callback_date || '') +
            ' — Campaign: ' + escapeHtml(getCampaignCode(donor)) +
            '</li>';
    });

    let coldCardsHtml = '';
    coldCardSales.forEach(donor => {
        coldCardsHtml += '<li>' +
            'ID: ' + escapeHtml(donor.card_id || '') +
            ' — ' + escapeHtml(donor.business_name || '') +
            ' — Contact: ' + escapeHtml(getReportContactName(donor)) +
            ' — Amount: $' + escapeHtml(donor.suggested_ask || 0) +
            ' — Last any sale year: ' + escapeHtml(donor.last_any_sale_year || 'unknown') +
            ' — Campaign: ' + escapeHtml(getCampaignCode(donor)) +
            '</li>';
    });

    let promotionHtml = '';
    promotionSales.forEach(donor => {
        promotionHtml += '<li>' +
            'ID: ' + escapeHtml(donor.card_id || '') +
            ' — ' + escapeHtml(donor.business_name || '') +
            ' — Contact: ' + escapeHtml(getReportContactName(donor)) +
            ' — Amount: $' + escapeHtml(donor.suggested_ask || 0) +
            ' — Last Autism sale year: ' + escapeHtml(donor.last_autism_sale_year || 'none/unknown') +
            ' — Campaign: ' + escapeHtml(getCampaignCode(donor)) +
            '</li>';
    });

    const reportBox = document.getElementById('reportBox');
    showReportOnly();

    reportBox.innerHTML =
        '<h2>' + escapeHtml(title) + '</h2>' +
        (startDate && endDate ? '<p><strong>Period:</strong> ' + escapeHtml(startDate) + ' to ' + escapeHtml(endDate) + '</p>' : '') +
        '<p class="report-line"><strong>Total contacts in scope:</strong> ' + reportData.length + '</p>' +
        '<p class="report-line"><strong>Still in call queue:</strong> ' + callQueue + '</p>' +
        '<p class="report-line"><strong>Calls made / worked:</strong> ' + callsMade + '</p>' +
        '<p class="report-line"><strong>Calls answered:</strong> ' + callsAnswered + '</p>' +
        '<p class="report-line"><strong>No answers:</strong> ' + noAnswer + '</p>' +
        '<p class="report-line"><strong>Callbacks:</strong> ' + callbacks + '</p>' +
        '<p class="report-line"><strong>Check details:</strong> ' + checkDetails + '</p>' +
        '<p class="report-line"><strong>Emails sent:</strong> ' + emailsSentList.length + '</p>' +
        '<p class="report-line"><strong>Closed sales:</strong> ' + closedSales.length + '</p>' +
        '<p class="report-line"><strong>Total sales amount:</strong> $' + closedSalesTotal + '</p>' +
        '<p class="report-line"><strong>Cold-card closed sales:</strong> ' + coldCardSales.length + '</p>' +
        '<p class="report-line"><strong>Promotion-eligible closed sales:</strong> ' + promotionSales.length + '</p>' +
        '<h3>Campaign Breakdown</h3>' +
        getCampaignBreakdownHtml(worked, closedSales, emailsSentList) +
        '<h3>Closed Sales</h3>' +
        '<ul class="report-list">' + closedSalesHtml + '</ul>' +
        '<h3>Email Sent Follow Ups</h3>' +
        '<ul class="report-list">' + emailsSentHtml + '</ul>' +
        '<h3>Cold Cards With Closed Sales In This Period</h3>' +
        '<ul class="report-list">' + coldCardsHtml + '</ul>' +
        '<h3>Promotion Eligible Cards With Closed Sales In This Period</h3>' +
        '<ul class="report-list">' + promotionHtml + '</ul>' +
        '<div class="no-print" style="margin-top: 20px;">' +
            '<button onclick="backToCallQueue()">Back to Call Queue</button>' +
            '<button onclick="window.print()">Print / Save as PDF</button>' +
        '</div>';
}
