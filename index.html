function todayString() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    return year + '-' + month + '-' + day;
}

function localDateString(value) {
    if (!value) return '';
    const date = new Date(value);
    if (isNaN(date.getTime())) {
        return String(value).slice(0, 10);
    }
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return year + '-' + month + '-' + day;
}

        donor.callback_date,
        donor.campaign_code,
        donor.sale_type,
        donor.sale_number
    ].join(' ').toLowerCase();

    return combined.includes(term.toLowerCase());
}

        status: status,

    if (status === 'Closed Sale') {
        updateData.sale_date = todayString();
        updateData.campaign_code = DEFAULT_CAMPAIGN_CODE;
        if (!updateData.sale_type) {
            updateData.sale_type = 'Business Sale';
        }
    }

    const { error } = await client
        .from('donors')
        .update(updateData)
        .eq('id', id);

        console.error('Status update failed:', error);
        alert('Failed to save status');
    } else {

}

function calculateColdCard(lastAnySaleYear, salesHistory) {
    const year = Number(lastAnySaleYear || 0);

    if (year) {
        return year <= 2020;
    }

    if (!salesHistory || String(salesHistory).trim() === '') {
        return true;
    }

    const years = String(salesHistory).match(/20\d{2}/g);
    if (!years || years.length === 0) {
        return false;
    }

    const latestYear = Math.max(...years.map(Number));
    return latestYear <= 2020;
}

function calculatePromotionEligible(lastAutismSaleYear) {
    const year = Number(lastAutismSaleYear || 0);
    if (!year) return true;
    return year < 2023;
}

function dateInRange(dateValue, startDate, endDate) {
    if (!dateValue) return false;
    const dateText = String(dateValue).slice(0, 10);
    return dateText >= startDate && dateText <= endDate;
}

function getPayCycleRange() {
    const today = new Date(todayString() + 'T00:00:00');
    const base = new Date(PAY_CYCLE_START + 'T00:00:00');
    const dayMs = 24 * 60 * 60 * 1000;
    let diffDays = Math.floor((today - base) / dayMs);
    let cycles = Math.floor(diffDays / 14);

    if (diffDays < 0) {
        cycles = Math.floor(diffDays / 14);
    }

    const start = new Date(base.getTime() + cycles * 14 * dayMs);
    const end = new Date(start.getTime() + 13 * dayMs);

    const toDateText = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return year + '-' + month + '-' + day;
    };

    return {
        start: toDateText(start),
        end: toDateText(end)
    };
}

function buildReport(title, data, startDate, endDate, campaignOnly) {
    let reportData = [...data];

    if (campaignOnly) {
        reportData = reportData.filter(donor =>
            !donor.campaign_code || donor.campaign_code === DEFAULT_CAMPAIGN_CODE
        );
    }

    let worked = reportData;

    if (startDate && endDate) {
        worked = reportData.filter(donor =>
            dateInRange(donor.last_status_change, startDate, endDate) ||
            dateInRange(donor.sale_date, startDate, endDate)
        );
    }

    const callQueue = reportData.filter(donor =>
        !donor.status || donor.status === 'Not Called'
    ).length;

    const noAnswer = worked.filter(donor =>
        donor.status === 'No Answer'
    ).length;

    const callbacks = worked.filter(donor =>
        donor.status === 'Callback Requested'
    ).length;

    const emailsSentList = worked.filter(donor =>
        donor.status === 'Email Sent'
    );

    const closedSales = worked.filter(donor =>
        donor.status === 'Closed Sale'
    );

    closedSales.sort((a, b) => {
        const saleA = Number(a.sale_number || 999999);
        const saleB = Number(b.sale_number || 999999);
        if (saleA !== saleB) return saleA - saleB;
        return String(a.sale_date || '').localeCompare(String(b.sale_date || ''));
    });

    const coldCards = reportData.filter(donor =>
        donor.cold_card === true || calculateColdCard(donor.last_any_sale_year, donor.sales_history)
    );

    const promotionCards = reportData.filter(donor =>
        donor.promotion_eligible === true || calculatePromotionEligible(donor.last_autism_sale_year)
    );

    const closedSalesTotal = closedSales.reduce((sum, donor) => {
        return sum + Number(donor.suggested_ask || 0);
    }, 0);

    const callsMade = worked.length;
    const callsAnswered = callsMade - noAnswer;

    let closedSalesHtml = '';

    closedSales.forEach((donor, index) => {
        const notesPreview = String(donor.notes || '').substring(0, 20);

        closedSalesHtml += '<li>' +
            'ID: ' + (donor.card_id || '') +
            ' — Business: ' + (donor.business_name || '') +
            ' — Amount: $' + (donor.suggested_ask || 0) +
            ' — Sale #: ' + (donor.sale_number || (index + 1)) +
            ' — Email: ' + (donor.email || '') +
            ' — Campaign: ' + (donor.campaign_code || DEFAULT_CAMPAIGN_CODE) +
            ' — Notes: ' + notesPreview +
            '</li>';
    });

    let emailsSentHtml = '';
    emailsSentList.forEach(donor => {
        emailsSentHtml += '<li>' +
            'ID: ' + (donor.card_id || '') +
            ' — Business: ' + (donor.business_name || '') +
            ' — Contact: ' + (donor.contact_name || '') +
            ' — Amount: $' + (donor.suggested_ask || 0) +
            ' — Follow-up Date: ' + (donor.callback_date || '') +
            '</li>';
    });

    let coldCardsHtml = '';
    coldCards.forEach(donor => {
        coldCardsHtml += '<li>' +
            'ID: ' + (donor.card_id || '') +
            ' — ' + (donor.business_name || '') +
            ' — Last any sale year: ' + (donor.last_any_sale_year || 'unknown') +
            '</li>';
    });

    let promotionHtml = '';
    promotionCards.forEach(donor => {
        promotionHtml += '<li>' +
            'ID: ' + (donor.card_id || '') +
            ' — ' + (donor.business_name || '') +
            ' — Last Autism sale year: ' + (donor.last_autism_sale_year || 'none/unknown') +
            '</li>';
    });

    const reportBox = document.getElementById('reportBox');
    showReportOnly();

    reportBox.innerHTML =
        '<h2>' + title + '</h2>' +
        (startDate && endDate ? '<p><strong>Period:</strong> ' + startDate + ' to ' + endDate + '</p>' : '') +
        '<p class="report-line"><strong>Total contacts:</strong> ' + reportData.length + '</p>' +
        '<p class="report-line"><strong>Still in call queue:</strong> ' + callQueue + '</p>' +
        '<p class="report-line"><strong>Calls made / worked:</strong> ' + callsMade + '</p>' +
        '<p class="report-line"><strong>Calls answered:</strong> ' + callsAnswered + '</p>' +
        '<p class="report-line"><strong>No answers:</strong> ' + noAnswer + '</p>' +
        '<p class="report-line"><strong>Callbacks:</strong> ' + callbacks + '</p>' +
        '<p class="report-line"><strong>Emails sent:</strong> ' + emailsSentList.length + '</p>' +
        '<p class="report-line"><strong>Closed sales:</strong> ' + closedSales.length + '</p>' +
        '<p class="report-line"><strong>Total sales amount:</strong> $' + closedSalesTotal + '</p>' +
        '<p class="report-line"><strong>Cold cards:</strong> ' + coldCards.length + '</p>' +
        '<p class="report-line"><strong>Promotion eligible:</strong> ' + promotionCards.length + '</p>' +
        '<h3>Closed Sales</h3>' +
        '<ul class="report-list">' + closedSalesHtml + '</ul>' +
        '<h3>Email Sent Follow Ups</h3>' +
        '<ul class="report-list">' + emailsSentHtml + '</ul>' +
        '<h3>Cold Cards</h3>' +
        '<ul class="report-list">' + coldCardsHtml + '</ul>' +
        '<h3>Promotion Eligible Cards</h3>' +
        '<ul class="report-list">' + promotionHtml + '</ul>' +
        '<div class="no-print" style="margin-top: 20px;">' +
            '<button onclick="backToCallQueue()">Back to Call Queue</button>' +
            '<button onclick="window.print()">Print / Save as PDF</button>' +
        '</div>';
}

function showDailyReport() {
    const today = todayString();
    buildReport('Daily Fundraising Report', allDonors, today, today, false);
}

function showPayCycleReport() {
    const range = getPayCycleRange();
    buildReport('Pay Cycle Fundraising Report', allDonors, range.start, range.end, false);
}

function showCampaignReport() {
    buildReport('Campaign Fundraising Report - ' + DEFAULT_CAMPAIGN_CODE, allDonors, null, null, true);
}
</script>
</body>
</html>
