<!DOCTYPE html>
<html>
<head>
<title>GKC Verified Call Queue</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;color:#222;padding:12px}
h1{font-size:22px;margin:0 0 8px 0}
.topbar,.summary{background:#fff;border:1px solid #ccc;padding:8px;margin:8px 0}
button{padding:5px 8px;margin:2px;cursor:pointer;font-size:12px}
select,input{font-size:12px;padding:4px}
table{width:100%;border-collapse:collapse;background:#fff;font-size:11px}
th,td{border:1px solid #ccc;padding:4px;vertical-align:top;text-align:left}
th{background:#1f4e79;color:white;position:sticky;top:0;z-index:1}
.safe{background:#eefbf1}.blocked{background:#fff0f0}.protected{background:#f5f5f5}
.badge{display:inline-block;padding:2px 5px;border-radius:7px;margin:1px 2px 1px 0;font-size:10px;background:#e9eef5}
.green{background:#d4edda}.red{background:#f8d7da}.yellow{background:#fff3cd}.blue{background:#e6f1ff}
.small{font-size:10px;color:#555;line-height:1.25}
.phone a{display:block;margin-bottom:2px}
.reason{max-width:310px;white-space:pre-wrap;word-break:break-word}
.school{max-width:280px;white-space:pre-wrap}.history{max-width:170px;white-space:pre-wrap}.ask{max-width:190px}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
#search{width:260px}
</style>
</head>
<body>
<h1>GKC Verified Call Queue</h1>
<div class="topbar">
  <div class="controls">
    <label>Campaign
      <select id="campaign" onchange="render()">
        <option value="all">All GKC</option>
        <option value="G2607">G2607 Hawke's Bay</option>
        <option value="G2614">G2614 Christchurch</option>
      </select>
    </label>
    <label>View
      <select id="view" onchange="render()">
        <option value="ready">Verified call-ready only</option>
        <option value="blocked">Blocked / needs verification</option>
        <option value="all">All GKC</option>
      </select>
    </label>
    <label>Status
      <select id="status" onchange="render()">
        <option value="active">Active only</option>
        <option value="all">All statuses</option>
        <option value="Not Called">Not Called</option>
        <option value="No Answer">No Answer</option>
        <option value="Check Details">Check Details</option>
        <option value="Put Aside">Put Aside</option>
        <option value="Closed Sale">Closed Sale</option>
      </select>
    </label>
    <input id="search" placeholder="Search card, business, contact, phone" oninput="render()">
    <button onclick="loadDonors()">Reload</button>
  </div>
  <div class="small">GKC only. Autism campaigns are excluded. Rows Andy already moved to No Answer/Closed Sale are preserved.</div>
</div>
<div id="summary" class="summary">Loading...</div>
<table>
<thead>
<tr>
<th>ID</th><th>Campaign/status</th><th>Business/contact</th><th>Phone</th><th>Ask/pay</th>
<th>Specific local school angle</th><th>History</th><th>Verification/block reason</th><th>Actions</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ldkxgkigfbviyxlspxrl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxka3hna2lnZmJ2aXl4bHNweHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MDQzNTgsImV4cCI6MjA5NTA4MDM1OH0.QuFqGtAdT85dVyF7Xs1pobhGb2I7o9D9ORTGk0T070s";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let rows = [];
const activeStatuses = new Set(["Not Called","Email Sent"]);

function esc(v){return String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]));}
function tel(v){let s=String(v||"").replace(/[^\d+]/g,"");return s?`tel:${s}`:"";}
function money(n){return "$"+Math.round(Number(n||0)).toLocaleString();}

async function loadDonors(){
  document.getElementById("summary").textContent="Loading GKC rows...";
  rows=[]; let from=0, size=1000;
  while(true){
    const {data,error}=await client.from("donors").select("*").in("campaign_code",["G2607","G2614"]).range(from,from+size-1);
    if(error){document.getElementById("summary").textContent="Load error: "+error.message;return;}
    rows=rows.concat(data||[]);
    if(!data || data.length<size) break;
    from+=size;
  }
  render();
}
function filtered(){
  const camp=document.getElementById("campaign").value, view=document.getElementById("view").value, st=document.getElementById("status").value, q=document.getElementById("search").value.toLowerCase().trim();
  return rows.filter(d=>{
    if(camp!="all"&&d.campaign_code!==camp)return false;
    if(view==="ready"&&d.verified_call_ready!==true)return false;
    if(view==="blocked"&&d.verified_call_ready===true)return false;
    if(st==="active"&&!activeStatuses.has(d.status||""))return false;
    if(st!=="active"&&st!=="all"&&d.status!==st)return false;
    if(q){
      const hay=[d.card_id,d.business_name,d.contact_name,d.mobile,d.office_phone,d.email,d.local_school_angle,d.call_block_reason,d.ask_reason,d.phone_notes,d.notes].join(" ").toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  }).sort((a,b)=>(Number(b.verified_call_ready)-Number(a.verified_call_ready))||(Number(b.suggested_ask||0)-Number(a.suggested_ask||0))||(Number(b.priority_score||0)-Number(a.priority_score||0))||String(a.business_name||"").localeCompare(String(b.business_name||"")));
}
function renderSummary(shown){
  const total=rows.length, ready=rows.filter(d=>d.verified_call_ready===true).length, blocked=total-ready;
  const ask=shown.reduce((s,d)=>s+Number(d.suggested_ask||0),0);
  document.getElementById("summary").innerHTML=`<b>Shown:</b> ${shown.length} &nbsp; <b>GKC total:</b> ${total} &nbsp; <b>Verified ready:</b> ${ready} &nbsp; <b>Blocked/recheck:</b> ${blocked} &nbsp; <b>Shown ask:</b> ${money(ask)} &nbsp; <b>30% est:</b> ${money(ask*0.3)}`;
}
function render(){
  const shown=filtered(); renderSummary(shown);
  document.getElementById("tbody").innerHTML=shown.map(d=>{
    const ready=d.verified_call_ready===true, prot=["Closed Sale","Personal Donation","No","Not Interested","No Answer","No Answer 2","No Answer - Unblocked ID"].includes(d.status||"");
    const cls=ready?"safe":(prot?"protected":"blocked");
    const ask=Number(d.suggested_ask||0), kids=ask%70===0?`${ask/70} kids`:"";
    const mobile=d.mobile?`<a href="${tel(d.mobile)}">${esc(d.mobile)}</a>`:"";
    const office=d.office_phone?`<a href="${tel(d.office_phone)}">${esc(d.office_phone)}</a>`:"";
    return `<tr class="${cls}">
<td>${esc(d.card_id)}</td>
<td>${esc(d.campaign_code)}<br><span class="small">${esc(d.status)}</span></td>
<td><b>${esc(d.business_name)}</b><br>${esc(d.contact_name||d.contactability_status||"")}<br><span class="small">${esc(d.email||"")}</span></td>
<td class="phone">${mobile}${office}<span class="small">${esc(d.phone_qa_status||"")}</span></td>
<td class="ask"><b>${money(ask)}</b> <span class="small">${kids}</span><br><span class="badge green">${esc(String(Number(d.commission_rate||0)*100||""))}% commission</span><br><span class="small">${esc(d.ask_reason||"")}</span></td>
<td class="school">${esc(d.local_school_angle||"")}</td>
<td class="history">${esc(d.sales_history||"")}<br><span class="small">${esc(d.history_group||"")}</span></td>
<td class="reason">${ready?'<span class="badge green">CALL READY</span>':'<span class="badge red">BLOCKED</span>'}<span class="badge blue">${esc(d.verification_status||"")}</span><br><span class="small">${esc(d.call_block_reason||"")}</span></td>
<td><button onclick="setStatus('${d.id}','No Answer')">No Answer</button><button onclick="setStatus('${d.id}','Check Number')">Bad Number</button><button onclick="setStatus('${d.id}','Check Details')">Check Details</button><button onclick="setStatus('${d.id}','Put Aside')">Put Aside</button></td>
</tr>`;
  }).join("");
}
async function setStatus(id,status){
  const patch={status,last_status_change:new Date().toISOString()};
  if(status==="No Answer") patch.last_called=new Date().toISOString();
  if(status==="Check Number"){patch.verified_call_ready=false;patch.daily_call_list=false;patch.phone_qa_status="LIVE_CALL_FAILED_CHECK_NUMBER";patch.call_block_reason="phone failed live call / check number before retry";}
  const {error}=await client.from("donors").update(patch).eq("id",id);
  if(error){alert("Update failed: "+error.message);return;}
  await loadDonors();
}
loadDonors();
</script>
</body>
</html>
